name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by a version tag push (e.g. v0.9.0-beta, v1.0.0).
# Builds binary packages for all supported distributions and publishes a
# Codeberg release with all artifacts.
#
# No Node.js-based actions are used — all steps are plain shell so that
# containers without Node (fedora:41, ubuntu:24.04) work out of the box.
#
# Prerequisites (one-time manual setup):
#   1. Settings → Units → enable Actions
#   2. Settings → Secrets → add RELEASE_TOKEN
#      (PAT from your profile → Settings → Applications, scope: write:repository)
#
# Artifacts produced:
#   astrofind-<ver>-0.beta1.x86_64.rpm  — Fedora / Rocky Linux / openSUSE TW
#   astrofind_<ver>~beta-1_amd64.deb    — Debian / Ubuntu / Mint / Zorin / Pop!_OS
#   astrofind-<ver>-arch-PKGBUILD.tar.gz — Arch Linux / Manjaro (source build)
#   install.sh                           — universal bilingual installer
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

jobs:

  # ── Create draft release ────────────────────────────────────────────────────
  prepare:
    name: Create draft release
    runs-on: codeberg-tiny
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      tag: ${{ steps.create.outputs.tag }}
      version: ${{ steps.create.outputs.version }}

    steps:
      - name: "📥  Clone repository"
        run: |
          TAG="${{ github.ref_name }}"
          git clone --depth 1 --branch "${TAG}" \
            https://codeberg.org/petrinhu/astrofind.git .

      - name: "🗑️   Delete existing release/tag if present"
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Find and delete any previous release for this tag (ignore errors)
          curl -s "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases/tags/${TAG}" \
            -H "Authorization: token ${RELEASE_TOKEN}" | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null | \
            while read id; do
              [ -n "$id" ] && curl -sf -X DELETE \
                "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases/${id}" \
                -H "Authorization: token ${RELEASE_TOKEN}" && echo "Deleted old release ${id}"
            done || true

      - name: "🚀  Create draft release"
        id: create
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          VERNUM="${VER%%-*}"

          PRERELEASE=false
          echo "${VER}" | grep -qiE 'alpha|beta|rc' && PRERELEASE=true

          # Extract release notes from CHANGELOG (English block)
          NOTES=$(awk "/^### \[${VER}\]/{found=1; next} found && /^### \[/{exit} found{print}" CHANGELOG.md)
          [ -z "${NOTES}" ] && NOTES="Release ${VER}"

          RESPONSE=$(curl -sf -X POST \
            "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases" \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"AstroFind ${VER}\",
              \"body\": $(printf '%s' "${NOTES}" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"prerelease\": ${PRERELEASE},
              \"draft\": true
            }")

          RELEASE_ID=$(echo "${RESPONSE}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          echo "release_id=${RELEASE_ID}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"               >> $GITHUB_OUTPUT
          echo "version=${VER}"           >> $GITHUB_OUTPUT
          echo "Draft release created — ID: ${RELEASE_ID}"

  # ── Build RPM + DEB on Fedora host (no container — avoids Docker NAT issues) ─
  build-packages:
    name: Build RPM + DEB (Fedora host)
    runs-on: [self-hosted, codeberg-small]
    needs: prepare

    steps:
      - name: "📥  Clone repository"
        run: |
          git clone --depth 1 --branch "${{ needs.prepare.outputs.tag }}" \
            https://codeberg.org/petrinhu/astrofind.git .

      - name: "⚙️   CMake configure + build"
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j$(nproc)

      - name: "🧪  Run tests"
        run: |
          build/bin/astrofind_tests --reporter console || true

      - name: "📦  Build RPM"
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          VERNUM="${VER%%-*}"
          RELNUM="0.beta1"
          ARCH=$(uname -m)
          BUILDROOT="${HOME}/rpmbuild/BUILDROOT/astrofind-${VERNUM}-${RELNUM}.fc43.${ARCH}"

          DESTDIR=$PWD/staging cmake --install build
          rpmdev-setuptree

          # Use pre-written binary spec (no heredoc — avoids YAML directive conflicts)
          sed "s/^Version:.*/Version:        ${VERNUM}/; s/\r//" \
              packaging/rpm/astrofind-binary.spec > ~/rpmbuild/SPECS/astrofind.spec

          # Pass staging path via --define so %install can copy it into buildroot
          rpmbuild -bb ~/rpmbuild/SPECS/astrofind.spec \
            --define "staging $PWD/staging" \
            --define "_unpackaged_files_terminate_build 0" \
            --nodeps --nocheck
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} . \;
          ls -lh *.rpm

      - name: "📦  Build DEB"
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          VERNUM="${VER%%-*}"
          DEBVER="${VERNUM}~beta-1"
          ARCH="amd64"
          PKGDIR="astrofind-deb/astrofind_${DEBVER}_${ARCH}"

          # Copy only usr/bin and usr/share — skip QuaZip dev headers/libs/cmake
          mkdir -p "${PKGDIR}/DEBIAN"
          mkdir -p "${PKGDIR}/usr/bin"
          mkdir -p "${PKGDIR}/usr/share"
          cp -r staging/usr/bin/AstroFind "${PKGDIR}/usr/bin/"
          cp -r staging/usr/share/applications "${PKGDIR}/usr/share/"
          cp -r staging/usr/share/icons "${PKGDIR}/usr/share/"

          # Build DEBIAN/control: binary stanza only, Version field, no debhelper vars
          cat > "${PKGDIR}/DEBIAN/control" << CTLEOF
Package: astrofind
Version: ${DEBVER}
Architecture: ${ARCH}
Maintainer: Petrus Silva Costa <petrinhu@yahoo.com.br>
Installed-Size: $(du -sk "${PKGDIR}/usr" | cut -f1)
Depends: libqt6core6t64 (>= 6.4) | libqt6core6 (>= 6.4),
 libqt6charts6 (>= 6.4),
 libqt6widgets6t64 (>= 6.4) | libqt6widgets6 (>= 6.4),
 libqt6opengl6 (>= 6.4),
 libqt6openglwidgets6 (>= 6.4),
 libcfitsio10t64 | libcfitsio10 | libcfitsio9,
 libfftw3-double3,
 libarchive13t64 | libarchive13
Description: Modern asteroid detection software for citizen science
 AstroFind is asteroid detection software for citizen science and
 educational use. Compatible with the IASC / MPC workflow.
 Outputs ADES 2022 format (XML and PSV) for submission to the MPC.
 .
 Features: FITS viewer (SER/XISF/TIFF/PNG), plate solving via
 astrometry.net and ASTAP, star detection (SEP), aperture photometry,
 blink comparison, Moving Object Detection across 3+ images,
 calibration (dark/flat/bias), and full bilingual EN/PT-BR interface.
 .
 NOTE: This is a beta release. All features are implemented but
 end-to-end validation with real telescope FITS files has not yet
 been performed.
CTLEOF

          mkdir -p "${PKGDIR}/usr/share/doc/astrofind"
          sed 's/\r//' packaging/debian/changelog > "${PKGDIR}/usr/share/doc/astrofind/changelog.Debian"
          gzip -9 "${PKGDIR}/usr/share/doc/astrofind/changelog.Debian"
          sed 's/\r//' packaging/debian/copyright > "${PKGDIR}/usr/share/doc/astrofind/copyright"

          fakeroot dpkg-deb --build "${PKGDIR}"
          find astrofind-deb -name '*.deb' -exec cp {} . \;
          ls -lh *.deb

      - name: "⬆️   Upload RPM + DEB to release"
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          for f in *.rpm *.deb; do
            [ -f "$f" ] || continue
            echo "Uploading ${f}..."
            curl -sf -X POST \
              "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases/${RELEASE_ID}/assets?name=${f}" \
              -H "Authorization: token ${RELEASE_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${f}"
            echo " ✓ ${f}"
          done

  # ── Arch PKGBUILD tarball ─────────────────────────────────────────────────
  package-arch:
    name: Package Arch PKGBUILD
    runs-on: codeberg-tiny
    needs: prepare

    steps:
      - name: "📥  Clone repository"
        run: |
          git clone --depth 1 --branch "${{ needs.prepare.outputs.tag }}" \
            https://codeberg.org/petrinhu/astrofind.git .

      - name: "📦  Create and upload PKGBUILD tarball"
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          VERNUM="${VER%%-*}"
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          TARNAME="astrofind-${VER}-arch-PKGBUILD.tar.gz"

          sed -i "s/^pkgver=.*/pkgver=${VERNUM}beta/" packaging/arch/PKGBUILD
          mkdir -p astrofind-arch
          cp packaging/arch/PKGBUILD astrofind-arch/
          tar czf "${TARNAME}" astrofind-arch/
          ls -lh "${TARNAME}"

          curl -sf -X POST \
            "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases/${RELEASE_ID}/assets?name=${TARNAME}" \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${TARNAME}"
          echo " ✓ ${TARNAME}"

  # ── install.sh ────────────────────────────────────────────────────────────
  package-installer:
    name: Upload install.sh
    runs-on: codeberg-tiny
    needs: prepare

    steps:
      - name: "📥  Clone repository"
        run: |
          git clone --depth 1 --branch "${{ needs.prepare.outputs.tag }}" \
            https://codeberg.org/petrinhu/astrofind.git .

      - name: "⬆️   Upload install.sh to release"
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          chmod +x packaging/install.sh
          curl -sf -X POST \
            "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases/${RELEASE_ID}/assets?name=install.sh" \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"packaging/install.sh"
          echo " ✓ install.sh"

  # ── Publish release ────────────────────────────────────────────────────────
  publish:
    name: Publish release
    runs-on: codeberg-tiny
    needs: [prepare, build-packages, package-arch, package-installer]

    steps:
      - name: "🎉  Publish release"
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          RELEASE_ID="${{ needs.prepare.outputs.release_id }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          curl -sf -X PATCH \
            "https://codeberg.org/api/v1/repos/petrinhu/astrofind/releases/${RELEASE_ID}" \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"draft": false}'
          echo ""
          echo "Release published: https://codeberg.org/petrinhu/astrofind/releases/tag/${TAG}"
