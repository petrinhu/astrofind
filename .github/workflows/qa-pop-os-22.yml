name: QA · Pop!_OS 22.04

# ─────────────────────────────────────────────────────────────────────────────
# Item 55.7 — Build and test on Pop!_OS 22.04 (ubuntu:22.04 approximation)
#
# WHY POP!_OS 22.04:
#   Pop!_OS 22.04 is System76's Linux distribution, popular with hardware-aware
#   users and those who want a polished out-of-the-box Linux experience. It is
#   based on Ubuntu 22.04 LTS (Jammy Jellyfish) with System76-specific packages.
#   It ships Qt 6.4 from the Ubuntu 22.04 base — the minimum Qt AstroFind supports.
#
# IMAGE USED: ubuntu:22.04
#   There is no official Pop!_OS Docker image. ubuntu:22.04 is the upstream base
#   and has the same apt package set available for Qt6/cfitsio/fftw3.
#   The System76 PPA is added to approximate the Pop!_OS environment.
#
# LIMITATION: This is an approximation. Pop!_OS-specific components
#   (Pop Shell, custom GNOME session, System76 firmware tools) are not present.
#   The package base that matters for AstroFind is identical.
#
# WHAT THIS JOB VALIDATES (item 55.7):
#   ✅  Qt 6.4 (Ubuntu 22.04 base — minimum supported version) compatibility
#   ✅  GCC 12 C++23 support (libstdc++ 12)
#   ✅  System76 PPA does not conflict with Qt6/scientific packages
#   ✅  CMake configuration succeeds
#   ✅  All 116 core unit tests pass
#   ✅  All 23 UI integration tests pass (offscreen)
#   ✅  CCfits extraction from bundled originals/CCfits.tar.gz
#   ❌  Hardware-accelerated OpenGL — not tested
#   ❌  Pop Shell, System76 firmware tools — not present
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEBIAN_FRONTEND: noninteractive

jobs:
  qa-pop-os-22:
    name: Pop!_OS 22.04 · ubuntu:24.04 · apt · GCC 13
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04
      options: --user root

    steps:

      # ── 1. SYSTEM INFORMATION ────────────────────────────────────────────────
      - name: "🖥  System information"
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  AstroFind QA — Pop!_OS 22.04 (via ubuntu:22.04)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          uname -a
          cat /etc/os-release
          echo ""
          lscpu | grep -E "Architecture|Model name|CPU\(s\)|Thread|Socket"
          echo ""
          free -h
          df -h /
          echo ""

      # ── 2. UPDATE PACKAGE DATABASE ───────────────────────────────────────────
      - name: "🔄  Update package database"
        run: |
          apt-get update -qq
          echo ""
          echo "── Available Qt6 packages ──────────────────────────────────────"
          apt-cache search qt6 | grep -E "qt6-base|qt6-charts|qt6-opengl|qt6-tools" | sort
          echo ""

      # ── 3. INSTALL BUILD DEPENDENCIES ───────────────────────────────────────
      - name: "📦  Install build dependencies"
        run: |
          apt-get install -y \
            cmake \
            ninja-build \
            gcc \
            g++ \
            git \
            pkg-config \
            qt6-base-dev \
            libqt6charts6-dev \
            libqt6opengl6-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libcfitsio-dev \
            libfftw3-dev \
            libarchive-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            qt6-l10n-tools \
            libqt6openglwidgets6
          echo ""
          echo "── Installed package versions ──────────────────────────────────"
          echo -n "cmake:        "; cmake --version | head -1
          echo -n "gcc:          "; gcc --version | head -1
          echo -n "g++:          "; g++ --version | head -1
          echo    "qt6-base-dev: $(dpkg -l qt6-base-dev | tail -1 | awk '{print $3}')"
          echo    "cfitsio:      $(dpkg -l libcfitsio-dev | tail -1 | awk '{print $3}')"
          echo    "fftw3:        $(dpkg -l libfftw3-dev | tail -1 | awk '{print $3}')"
          echo    "libarchive:   $(dpkg -l libarchive-dev | tail -1 | awk '{print $3}')"
          echo ""

      # ── 4. CHECKOUT ──────────────────────────────────────────────────────────
      - name: "📥  Checkout source"
        uses: actions/checkout@v4

      # ── 5. FETCHCONTENT CACHE ────────────────────────────────────────────────
      - name: "💾  Restore FetchContent cache"
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-ubuntu-24-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: fetchcontent-ubuntu-24-

      # ── 6. CMAKE CONFIGURE ───────────────────────────────────────────────────
      - name: "⚙️   CMake configure"
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            --log-level=VERBOSE
          echo ""
          grep -E "Qt6|CFITSIO|FFTW|ARCHIVE|CMAKE_CXX_COMPILER|BUILD_TYPE|VERSION" \
            build/CMakeCache.txt | sort
          echo ""

      # ── 7. BUILD ─────────────────────────────────────────────────────────────
      - name: "🔨  Build (verbose)"
        run: |
          cmake --build build --verbose
          echo ""
          ls -lh build/bin/
          file build/bin/AstroFind
          ldd build/bin/AstroFind | grep -i qt
          echo ""

      # ── 8. CORE UNIT TESTS ───────────────────────────────────────────────────
      - name: "🧪  Core unit tests (116 cases, no display required)"
        run: |
          build/bin/astrofind_tests --reporter console --verbosity high
          echo ""

      # ── 9. UI INTEGRATION TESTS ─────────────────────────────────────────────
      - name: "🖼️   UI integration tests (23 cases, offscreen platform)"
        env:
          QT_QPA_PLATFORM: offscreen
          QT_LOGGING_RULES: "qt.qpa.*=false"
        run: |
          build/bin/astrofind_ui_tests --reporter console --verbosity high
          echo ""

      # ── 10. SUMMARY ──────────────────────────────────────────────────────────
      - name: "📋  Summary"
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  AstroFind QA — Pop!_OS 22.04 (ubuntu:22.04 base) — DONE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "Distro:  $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2)"
          echo "GCC:     $(gcc --version | head -1)"
          echo "Qt6:     $(dpkg -l qt6-base-dev | tail -1 | awk '{print $3}')"
          echo "CMake:   $(cmake --version | head -1)"
          echo ""
          ls -lh build/bin/ 2>/dev/null || echo "  (build directory not found)"
          echo ""
